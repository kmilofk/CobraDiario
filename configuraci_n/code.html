<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a1a7f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1a1a7f33;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-background-dark shadow-xl overflow-hidden">
<!-- Header -->
<header class="flex items-center bg-white dark:bg-background-dark p-4 sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<button class="text-primary p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold ml-2">Configuración</h1>
</header>
<main class="flex-1 overflow-y-auto custom-scrollbar pb-24">
<!-- Loans Section -->
<section class="px-4 py-6">
<h2 class="text-primary text-sm font-bold uppercase tracking-wider mb-4 px-1">Préstamos y Moneda</h2>
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Interés por defecto (%)</label>
<div class="relative flex items-center">
<input class="w-full h-12 pl-4 pr-12 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="0.00" step="0.1" type="number"/>
<span class="absolute right-4 text-slate-400 material-symbols-outlined">percent</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Tipo de Moneda</label>
<div class="relative">
<select class="w-full h-12 px-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none transition-all">
<option value="usd">USD - Dólar Estadounidense</option>
<option value="eur">EUR - Euro</option>
<option value="mxn">MXN - Peso Mexicano</option>
<option value="cop">COP - Peso Colombiano</option>
</select>
<span class="absolute right-4 top-3 text-slate-400 material-symbols-outlined pointer-events-none">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Notifications Section -->
<section class="px-4 py-6 border-t border-slate-100 dark:border-slate-800">
<h2 class="text-primary text-sm font-bold uppercase tracking-wider mb-4 px-1">Notificaciones</h2>
<div class="bg-slate-50 dark:bg-slate-900 rounded-2xl p-4 space-y-6">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">notifications_active</span>
</div>
<div>
<p class="font-medium">Recordatorios de Pago</p>
<p class="text-xs text-slate-500">Alertas antes del vencimiento</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
<!-- Security Section -->
<section class="px-4 py-6 border-t border-slate-100 dark:border-slate-800">
<h2 class="text-primary text-sm font-bold uppercase tracking-wider mb-4 px-1">Privacidad y Seguridad</h2>
<div class="space-y-3">
<button class="w-full flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">fingerprint</span>
<span class="font-medium text-sm">Seguridad (Biométricos/PIN)</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">cloud_upload</span>
<span class="font-medium text-sm">Respaldo de Datos</span>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">AL DÍA</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Account Footer -->
<div class="px-6 py-8 text-center">
<button class="text-red-500 font-semibold text-sm hover:underline">Cerrar Sesión</button>
<p class="text-[10px] text-slate-400 mt-4 uppercase tracking-tighter">Versión 2.4.0 (Gold)</p>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="absolute bottom-0 left-0 right-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 px-6 py-2 pb-6">
<div class="flex justify-between items-center max-w-sm mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Inicio</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-medium">Préstamos</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-medium">Clientes</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="relative">
<span class="material-symbols-outlined filled">settings</span>
<div class="absolute -top-1 -right-1 w-2 h-2 bg-primary rounded-full border-2 border-white dark:border-background-dark"></div>
</div>
<span class="text-[10px] font-bold">Ajustes</span>
</a>
</div>
</nav>
</div>
</body></html>
