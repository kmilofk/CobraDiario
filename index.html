<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PrestoManage - Sistema de Préstamos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="js/auth.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a1a7f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        /* CRITICAL: Hide app immediately to prevent FOUC (Flash of Unauthenticated Content) */
        #app-shell,
        #bottom-nav {
            visibility: hidden !important;
            opacity: 0 !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            overflow: hidden !important;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div id="app-shell"
        class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
        <!-- Main Content Render Area -->
        <main id="app-content" class="flex-1 overflow-y-auto pb-24">
            <!-- Dynamic Content Injected Here -->
        </main>

        <!-- Global Navigation -->
        <nav id="bottom-nav"
            class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 z-50">
            <div class="flex justify-around items-center px-2 py-3">
                <a href="#dashboard" class="nav-link flex flex-col items-center gap-1 text-primary"
                    data-view="dashboard">
                    <span class="material-symbols-outlined text-2xl fill-1">grid_view</span>
                    <span class="text-[10px] font-bold uppercase tracking-tight">Inicio</span>
                </a>
                <a href="#clients" class="nav-link flex flex-col items-center gap-1 text-slate-400" data-view="clients">
                    <span class="material-symbols-outlined text-2xl">group</span>
                    <span class="text-[10px] font-medium uppercase tracking-tight">Clientes</span>
                </a>
                <a href="#loans" class="nav-link flex flex-col items-center gap-1 text-slate-400" data-view="loans">
                    <span class="material-symbols-outlined text-2xl">analytics</span>
                    <span class="text-[10px] font-medium uppercase tracking-tight">Reporte</span>
                </a>
                <a href="#agenda" class="nav-link flex flex-col items-center gap-1 text-slate-400" data-view="agenda">
                    <span class="material-symbols-outlined text-2xl">account_balance</span>
                    <span class="text-[10px] font-medium uppercase tracking-tight">Cobros</span>
                </a>
                <a href="#expenses" class="nav-link flex flex-col items-center gap-1 text-slate-400"
                    data-view="expenses">
                    <span class="material-symbols-outlined text-2xl">payments</span>
                    <span class="text-[10px] font-medium uppercase tracking-tight">Gastos</span>
                </a>
                <a href="#settings" class="nav-link flex flex-col items-center gap-1 text-slate-400"
                    data-view="settings">
                    <span class="material-symbols-outlined text-2xl">settings</span>
                    <span class="text-[10px] font-medium uppercase tracking-tight">Config</span>
                </a>
            </div>
        </nav>
    </div>

    <!-- Modals & Overlays -->
    <div id="modal-container" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="modal-overlay"></div>
        <div id="modal-content"
            class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl transform translate-y-full transition-transform duration-300">
            <!-- Dynamic Modal Content Injected Here -->
        </div>
    </div>

    <script src="js/storage.js?v=3"></script>
    <script src="js/logic.js?v=3"></script>
    <script src="js/views.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>

</html>
